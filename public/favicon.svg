<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14b488"/>
      <stop offset="1" stop-color="#0b7a5f"/>
    </linearGradient>
    <linearGradient id="pillTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf7f2"/>
    </linearGradient>
    <linearGradient id="pillBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff6e0"/>
      <stop offset="1" stop-color="#f2e1b5"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6b6b"/>
      <stop offset="1" stop-color="#d83a3a"/>
