  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>

  <g transform="translate(256 270) rotate(-30)">
    <rect x="-68" y="-168" width="136" height="168" rx="68" ry="68" fill="url(#pillTop)"/>
    <rect x="-68" y="0"    width="136" height="168" rx="68" ry="68" fill="url(#pillBot)"/>
    <rect x="-68" y="-4"   width="136" height="8" fill="#0d9373" opacity="0.85"/>
    <ellipse cx="-30" cy="-110" rx="14" ry="34" fill="#ffffff" opacity="0.55"/>
  </g>

  <g transform="translate(366 132)">
    <circle r="58" fill="#ffffff"/>
